
@(book: BooksModel)
@layout("Edit " + book.title){

<h1> @book.title</h1>
<p> Price : @book.price</p>
<p> Author: @book.author</p>


<a class="btn btn-success" href="@routes.BookController.edit(book.id)"><i class="glyphicon glyphicon-pencil"></i> Edit Book</a>
<button class="btn btn-danger" onclick="sendDeleteRequest(
    '@routes.BookController.destroy(book.id)',
    '@routes.BookController.index()')">
    <i class="glyphicon glyphicon-trash"></i> Delete Book</button>
}
