
@(book: BooksModel)
<head>
    <meta charset="UTF-8">
    <title>Edit @book.title</title>
</head>
<body>
<h1> @book.title</h1>
    <p> Price : @book.price</p>
    <p> Author: @book.author</p>


<button type="button"><a href="@routes.BookController.edit(book.id)">Edit Book</a></button>
<button type="button"><a href="@routes.BookController.destroy(book.id)">Delete Book</a></button>
</body>
