
@(books : List[BooksModel])
@layout("All Books"){
<h1> All Books</h1>
@for(book <- books){
<a href="@routes.BookController.show(book.id)">@book.title</a>
<p> Price : @book.price</p>
<p> Author: @book.author</p>
}
<button type="button"><a href="@routes.BookController.create()"> Add book to library</a></button>

}
