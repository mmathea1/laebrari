@(useruserForm: Form[UseruserData])

<h1>Create a Laebrari account</h1>

@flash.getOrDefault("success", "")

@helper.form(action = routes.UseruserController.useruserPost()) {
  @helper.CSRF.formField
  @helper.inputText(useruserForm("name"))
  @helper.inputText(useruserForm("age"))
  <input type="submit" value="submit"/>
<button type="button"><a href="@routes.HomeController.index"></a>Home</button>



}
